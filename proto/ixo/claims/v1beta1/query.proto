syntax = "proto3";
package ixo.claims.v1beta1;

import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "ixo/claims/v1beta1/claims.proto";

option go_package = "github.com/ixofoundation/ixo-blockchain/v8/x/claims/types";

// Query defines the gRPC querier service.
service Query {
  // Parameters queries the parameters of the module.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/ixo/claims/params";
  }
  rpc Collection(QueryCollectionRequest) returns (QueryCollectionResponse) {
    option (google.api.http).get = "/ixo/claims/collection/{id}";
  }
  rpc CollectionList(QueryCollectionListRequest)
      returns (QueryCollectionListResponse) {
    option (google.api.http).get = "/ixo/claims/collections";
  }
  rpc Claim(QueryClaimRequest) returns (QueryClaimResponse) {
    option (google.api.http).get = "/ixo/claims/claim/{id}";
  }
  rpc ClaimList(QueryClaimListRequest) returns (QueryClaimListResponse) {
    option (google.api.http).get = "/ixo/claims/claims";
  }
  rpc Dispute(QueryDisputeRequest) returns (QueryDisputeResponse) {
    option (google.api.http).get = "/ixo/claims/dispute/{proof}";
  }
  rpc DisputeList(QueryDisputeListRequest) returns (QueryDisputeListResponse) {
    option (google.api.http).get = "/ixo/claims/disputes";
  }
  rpc Intent(QueryIntentRequest) returns (QueryIntentResponse) {
    option (google.api.http).get =
        "/ixo/claims/intent/{agentAddress}/{collectionId}/{id}";
  }
  rpc IntentList(QueryIntentListRequest) returns (QueryIntentListResponse) {
    option (google.api.http).get = "/ixo/claims/intents";
  }
  rpc CollectionMember(QueryCollectionMemberRequest)
      returns (QueryCollectionMemberResponse) {
    option (google.api.http).get =
        "/ixo/claims/collection/{collectionId}/member/{memberAddress}";
  }
  rpc CollectionMemberList(QueryCollectionMemberListRequest)
      returns (QueryCollectionMemberListResponse) {
    option (google.api.http).get =
        "/ixo/claims/collection/{collectionId}/members";
  }
  // DisputeBySubject returns the dispute (if any) for a given subject_id
  // and target_role. Disputes targeting different roles of the same claim
  // are separate records.
  rpc DisputeBySubject(QueryDisputeBySubjectRequest)
      returns (QueryDisputeBySubjectResponse) {
    option (google.api.http).get =
        "/ixo/claims/dispute-by-subject/{subjectId}/{targetRole}";
  }
  // DisputeListForSubject returns all disputes (across all target roles
  // and over all time, regardless of status) for a given subject_id.
  rpc DisputeListForSubject(QueryDisputeListForSubjectRequest)
      returns (QueryDisputeListForSubjectResponse) {
    option (google.api.http).get =
        "/ixo/claims/disputes-for-subject/{subjectId}";
  }
  // AgentDepositBalance returns a single agent's deposit balance on a
  // collection.
  rpc AgentDepositBalance(QueryAgentDepositBalanceRequest)
      returns (QueryAgentDepositBalanceResponse) {
    option (google.api.http).get =
        "/ixo/claims/collection/{collectionId}/deposit/{agentAddress}";
  }
  // AgentDepositBalanceList returns all agent deposit balances for a
  // collection.
  rpc AgentDepositBalanceList(QueryAgentDepositBalanceListRequest)
      returns (QueryAgentDepositBalanceListResponse) {
    option (google.api.http).get =
        "/ixo/claims/collection/{collectionId}/deposits";
  }
}

message QueryParamsRequest {}

message QueryParamsResponse {
  // params holds all the parameters of this module.
  Params params = 1 [ (gogoproto.nullable) = false ];
}

message QueryCollectionRequest { string id = 1; }

message QueryCollectionResponse {
  Collection collection = 1 [ (gogoproto.nullable) = false ];
}

message QueryCollectionListRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryCollectionListResponse {
  repeated Collection collections = 1 [ (gogoproto.nullable) = false ];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryClaimRequest { string id = 1; }

message QueryClaimResponse { Claim claim = 1 [ (gogoproto.nullable) = false ]; }

message QueryClaimListRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryClaimListResponse {
  repeated Claim claims = 1 [ (gogoproto.nullable) = false ];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryDisputeRequest { string proof = 1; }

message QueryDisputeResponse {
  Dispute dispute = 1 [ (gogoproto.nullable) = false ];
}

message QueryDisputeListRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryDisputeListResponse {
  repeated Dispute disputes = 1 [ (gogoproto.nullable) = false ];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryIntentRequest {
  string id = 1;
  string agentAddress = 2;
  string collectionId = 3;
}

message QueryIntentResponse {
  Intent intent = 1 [ (gogoproto.nullable) = false ];
}

message QueryIntentListRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryIntentListResponse {
  repeated Intent intents = 1 [ (gogoproto.nullable) = false ];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryCollectionMemberRequest {
  string collectionId = 1;
  string memberAddress = 2;
}

message QueryCollectionMemberResponse {
  MemberBudget member_budget = 1 [ (gogoproto.nullable) = false ];
}

message QueryCollectionMemberListRequest {
  string collectionId = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

message QueryCollectionMemberListResponse {
  repeated MemberBudget member_budgets = 1 [ (gogoproto.nullable) = false ];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryDisputeBySubjectRequest {
  string subjectId = 1;
  DisputeTargetRole targetRole = 2;
}
message QueryDisputeBySubjectResponse {
  Dispute dispute = 1 [ (gogoproto.nullable) = false ];
}

message QueryDisputeListForSubjectRequest { string subjectId = 1; }
message QueryDisputeListForSubjectResponse {
  repeated Dispute disputes = 1 [ (gogoproto.nullable) = false ];
}

message QueryAgentDepositBalanceRequest {
  string collectionId = 1;
  string agentAddress = 2;
}
message QueryAgentDepositBalanceResponse {
  AgentDepositBalance balance = 1 [ (gogoproto.nullable) = false ];
}

message QueryAgentDepositBalanceListRequest {
  string collectionId = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}
message QueryAgentDepositBalanceListResponse {
  repeated AgentDepositBalance balances = 1 [ (gogoproto.nullable) = false ];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}
