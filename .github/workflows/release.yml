# This workflow creates a release using goreleaser
# via the 'make release' command.

name: Create release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "The desired tag for the release (e.g. v0.1.0)."
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.release_tag }}
      - name: Free disk space
        # goreleaser-cross is a large image and we build 4 CGO targets; the
        # default ubuntu-latest disk is tight, so reclaim space first.
        # NOTE: do NOT remove $AGENT_TOOLSDIRECTORY (/opt/hostedtoolcache) —
        # it holds Go, which `make release` needs to resolve COSMWASM_VERSION.
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost
          sudo docker image prune -af || true
          df -h /
      - name: Set up Go
        # Ensures `go list -m github.com/CosmWasm/wasmvm` works so the Makefile
        # can pass a non-empty COSMWASM_VERSION into goreleaser's wget pre-hooks.
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Make release
        run: |
          make release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: 🧹 Clean release folder
        run: |
          sudo rm -rf dist
